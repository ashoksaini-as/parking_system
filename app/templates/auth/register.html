<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ParkSmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    h1,h2 { font-family: 'Space Grotesk', sans-serif; }
    body { background: #f0f4f8; }
    input { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 0.6rem 1rem; width: 100%; transition: border 0.15s; outline: none; font-size: 0.95rem; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    .flash-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 10px 14px; border-radius: 10px; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .card { animation: fadeUp 0.35s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-100 rounded-full opacity-60 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-100 rounded-full opacity-60 blur-3xl"></div>
  </div>

  <div class="w-full max-w-sm relative card">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4 shadow-lg shadow-blue-200">P</div>
      <h1 class="text-2xl font-bold text-slate-800">Create Account</h1>
      <p class="text-slate-500 text-sm mt-1">Join ParkSmart today</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/80 p-8">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash-{{ category }} text-sm mb-4">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
            <input type="text" name="username" placeholder="Choose a username" required minlength="3"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
            <input type="password" name="password" placeholder="Min. 4 characters" required minlength="4"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Repeat password" required/>
          </div>
          <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2.5 rounded-xl transition-colors mt-2">
            Create Account
          </button>
        </div>
      </form>

      <p class="text-center text-sm text-slate-500 mt-5">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-blue-500 font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
